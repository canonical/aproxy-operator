project: aproxy

path: /home/ubuntu/proj

kill-timeout: 60m
warn-timeout: 1m

backends:
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04:
          runner: [ubuntu-24.04]
          arch: amd64
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-arm64:
          runner: [ubuntu-24.04-arm]
          arch: arm64
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-ppc64el:
          runner: [self-hosted-linux-ppc64el-resolute-medium]
          arch: ppc64el
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-s390x:
          runner: [self-hosted-linux-s390x-resolute-medium]
          arch: s390x
          cpu: 4
          memory: 8
          disk: 40

environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'

exclude:
  - .git
  - .github
  - .tox
  - .venv
  - .*_cache
  - build

integration-suites:
  tests/integration/:
    working-dir: ./
    summary: aproxy integration tests
    backends:
      - integration-test
    pytest-arguments-template: |
      --model testing
      --keep-models

suites:
  tests/spread/tutorial/:
    summary: aproxy tutorial smoke test
    systems:
      - ubuntu-24.04
    environment:
      TUTORIAL: docs/tutorial.md

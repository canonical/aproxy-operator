project: aproxy

path: /home/ubuntu/proj

kill-timeout: 60m
warn-timeout: 1m

backends:
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04:
          runner: [ubuntu-24.04]
          arch: amd64
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-arm64:
          runner: [ubuntu-24.04-arm]
          arch: arm64
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-ppc64el:
          runner: [self-hosted-linux-ppc64el-noble-edge]
          arch: ppc64el
          cpu: 4
          memory: 8
          disk: 40
      - ubuntu-24.04-s390x:
          runner: [self-hosted-linux-s390x-noble-medium]
          arch: s390x
          cpu: 4
          memory: 8
          disk: 40

environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'

exclude:
  - .git
  - .github
  - .tox
  - .venv
  - .*_cache

integration-suites:
  tests/integration/:
    working-dir: ./
    summary: aproxy integration tests
    auto-discover: false
    backends:
      - integration-test
    environment:
      MODULE/focal: tests/integration/test_charm.py
      MODULE/jammy: tests/integration/test_charm.py
      MODULE/noble: tests/integration/test_charm.py
      BASE/focal: "20.04"
      BASE/jammy: "22.04"
      BASE/noble: "24.04"
    pytest-arguments-template: |
      --model testing
      --keep-models
      --base {{ env.get("BASE", "24.04") }}
suites:
  tests/spread/tutorial/:
    summary: aproxy tutorial smoke test
    systems:
      - ubuntu-24.04
    environment:
      TUTORIAL: docs/tutorial.md

name: Integration tests

on:
  pull_request:
  schedule:
    - cron: "0 15 * * SAT"

jobs:
  integration-tests:
    uses: canonical/charm-ci/.github/workflows/integration-test.yml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read
    with:
      working-directory: .
      spread-jobs-include: "*tests/integration*"
      build-timeout-minutes: 120

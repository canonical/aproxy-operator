name: "Test tutorial documentation with Spread"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/tutorial.md"

jobs:
  tutorial-spread-test:
    uses: canonical/charm-ci/.github/workflows/integration-test.yml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read
    with:
      working-directory: .
      spread-jobs-include: "*tests/spread/tutorial*"
